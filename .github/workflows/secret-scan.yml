name: Secret scan

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  betterleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install betterleaks
        run: |
          VERSION=$(curl -sSL https://api.github.com/repos/betterleaks/betterleaks/releases/latest | grep -oP '"tag_name":\s*"v\K[^"]+')
          curl -sSL "https://github.com/betterleaks/betterleaks/releases/download/v${VERSION}/betterleaks_${VERSION}_linux_x64.tar.gz" \
            | tar xz
          sudo mv betterleaks /usr/local/bin/

      - name: Scan git history for secrets
        run: betterleaks git . -v --redact --regex-engine stdlib
