name: Secret scan

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  betterleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install betterleaks
        run: |
          curl -sSL https://github.com/betterleaks/betterleaks/releases/latest/download/betterleaks_linux_amd64.tar.gz \
            | tar xz
          sudo mv betterleaks /usr/local/bin/

      - name: Scan git history for secrets
        run: betterleaks git . -v --redact --regex-engine stdlib
