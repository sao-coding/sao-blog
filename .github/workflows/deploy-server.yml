name: Deploy server to NAS

on:
  push:
    branches: [main]
    paths:
      - "apps/server/**"
      - "packages/**"
      - "Dockerfile"
      - "docker-compose.yml"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "package.json"
  workflow_dispatch:

jobs:
  build-and-deploy:
    # 跑在你已綁定的 PVE CT self-hosted runner（效能好，build 快）
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build docker image
        run: docker build -t sao-blog-server:latest -f Dockerfile .

      - name: Save image to tar
        run: docker save sao-blog-server:latest -o sao-blog-server.tar

      - name: Copy image + compose file to NAS
        env:
          SSHPASS: ${{ secrets.NAS_PASSWORD }}
        run: |
          sshpass -e scp -P ${{ secrets.NAS_PORT }} -o StrictHostKeyChecking=no \
            sao-blog-server.tar docker-compose.yml \
            ${{ secrets.NAS_USERNAME }}@${{ secrets.NAS_HOST }}:/volume1/docker/blog-server/

      - name: Load image & restart container on NAS
        env:
          SSHPASS: ${{ secrets.NAS_PASSWORD }}
        run: |
          sshpass -e ssh -p ${{ secrets.NAS_PORT }} -o StrictHostKeyChecking=no \
            ${{ secrets.NAS_USERNAME }}@${{ secrets.NAS_HOST }} '
              cd /volume1/docker/blog-server &&
              docker load -i sao-blog-server.tar &&
              docker compose up -d --no-build &&
              rm -f sao-blog-server.tar
            '

      - name: Cleanup runner workspace
        if: always()
        run: rm -f sao-blog-server.tar

      - name: Prune docker build cache & unused images
        if: always()
        run: docker system prune -af --volumes
